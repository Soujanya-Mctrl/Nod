specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: Nod
    network: sepolia
    source:
      address: "0x0000000000000000000000000000000000000000" # Update with deployed address
      abi: Nod
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Agreement
      abis:
        - name: Nod
          file: ./abis/Nod.json
      eventHandlers:
        - event: AgreementSealed(indexed bytes32,string,indexed address,indexed address,uint256)
          handler: handleAgreementSealed
        - event: AgreementDeclined(indexed bytes32,indexed address,uint256)
          handler: handleAgreementDeclined
      file: ./src/mapping.ts
